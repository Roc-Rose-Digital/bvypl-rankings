name: Fetch Dribl Data

on:
  schedule:
    # Mon–Thu: once daily at midnight AEST (2pm UTC)
    - cron: '0 14 * * 1-4'
    # Friday: hourly from noon AEST (2am UTC) through midnight
    - cron: '0 2-23 * * 5'
    # Saturday: hourly all day
    - cron: '0 * * * 6'
    # Sunday: hourly until midnight AEST (2pm UTC)
    - cron: '0 0-14 * * 0'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data from Dribl
        run: node scripts/fetch-data.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: refresh Dribl data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
